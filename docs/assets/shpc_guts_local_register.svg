     id="rect311" />
  <text
     x="60"
     y="622.05182"
     font-family="'DejaVu Sans', sans-serif"
     font-size="13px"
     font-weight="700"
     fill="#2b2b2b"
     id="text313">Every box is manual and per-version, failures are silent during this process</text>
  <text
     x="60"
     y="643.05182"
     font-family="'DejaVu Sans', sans-serif"
     font-size="12px"
     fill="#757575"
     id="text315">Skip the conda subtraction (2) and the module exposes ~100 junk commands; reuse another build’s aliases (3) and it exposes tools the image</text>
  <text
     x="60"
     y="659.05182"
     font-family="'DejaVu Sans', sans-serif"
     font-size="12px"
     fill="#757575"
     id="text317">doesn’t contain. Either way it still “installs” cleanly and errors only appear once a command is run.</text>
