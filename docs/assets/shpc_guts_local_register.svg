  <text
     x="620"
     y="226.05179"
     font-family="'DejaVu Sans', sans-serif"
     font-size="11px"
     fill="#757575"
     id="text273">The recipe that was curl’d only lists aliases for the builds that theupstream tracked.</text>
  <text
     x="620"
     y="242.05179"
     font-family="'DejaVu Sans', sans-serif"
     font-size="11px"
     fill="#757575"
     id="text275">For an untracked version you must derive them from the SIF itself:</text>
  <!-- M1 -->
  <rect
     x="620"
     y="256.05179"
     width="450"
     height="52"
     rx="8"
     fill="#ffffff"
     stroke="#e0e0e0"
     id="rect277" />
  <text
     x="636"
     y="278.05179"
     font-family="'DejaVu Sans', sans-serif"
     font-size="13px"
     font-weight="700"
     fill="#2b2b2b"
     id="text279">1 · Diff the SIF against base-OS images</text>
  <text
     x="636"
     y="297.05179"
     font-family="'DejaVu Sans', sans-serif"
     font-size="11px"
     fill="#616161"
     id="text281">files unique to the container = candidate executables (via shpc-guts)</text>
  <!-- M2 -->
  <rect
     x="620"
     y="318.05179"
     width="450"
     height="72"
     rx="8"
     fill="#fdf4f2"
     stroke="#eebfb6"
     id="rect283" />
  <text
     x="636"
     y="340.05179"
     font-family="'DejaVu Sans', sans-serif"
     font-size="13px"
     font-weight="700"
     fill="#2b2b2b"
     id="text287">2 · Subtract the conda layer <tspan
   fill="#c62828"
   id="tspan285">⚠</tspan></text>
  <text
     x="636"
     y="359.05179"
     font-family="'DejaVu Sans', sans-serif"
     font-size="11px"
     fill="#757575"
     id="text289">BioContainers bundle a full conda stack; the raw diff returns ~90–100</text>
  <text
     x="636"
     y="375.05179"
     font-family="'DejaVu Sans Mono', monospace"
     font-size="10.5px"
     fill="#c62828"
     id="text291">non-tool binaries: mamba · pip3 · conda · activate · python …</text>
  <!-- M3 -->
  <rect
     x="620"
     y="400.05179"
     width="450"
     height="90"
     rx="8"
     fill="#fdf4f2"
     stroke="#eebfb6"
     id="rect293" />
  <text
     x="636"
     y="422.05179"
     font-family="'DejaVu Sans', sans-serif"
     font-size="13px"
     font-weight="700"
     fill="#2b2b2b"
     id="text297">3 · Never inherit another version’s aliases <tspan
   fill="#c62828"
   id="tspan295">⚠</tspan></text>
  <text
     x="636"
     y="441.05179"
     font-family="'DejaVu Sans', sans-serif"
     font-size="11px"
     fill="#757575"
     id="text299">Copying a newer build’s list leaks binaries this image lacks:</text>
  <text
     x="636"
     y="459.05179"
     font-family="'DejaVu Sans Mono', monospace"
     font-size="10.5px"
     fill="#c62828"
     id="text301">star-fusion 1.0.0 ← 1.10.1 ⇒ exposes `salmon`</text>
  <text
     x="636"
     y="477.05179"
     font-family="'DejaVu Sans', sans-serif"
     font-size="11px"
     fill="#757575"
     id="text303">salmon isn’t in 1.0.0 → command-not-found, or a wrong binary on PATH</text>
  <!-- result strip -->
  <rect
     x="620"
     y="500.05179"
     width="450"
     height="46"
     rx="8"
     fill="#e8f5e9"
     stroke="#2e7d32"
     id="rect305" />
  <text
     x="636"
     y="520.05182"
     font-family="'DejaVu Sans', sans-serif"
     font-size="12.5px"
     font-weight="700"
     fill="#2e7d32"
     id="text307">→ only now do the generated wrappers match the real SIF</text>
  <text
     x="636"
     y="537.05182"
     font-family="'DejaVu Sans', sans-serif"
     font-size="11px"
     fill="#757575"
     id="text309">each alias becomes a singularity-exec shell function on $PATH</text>
  <!-- ============ FOOTER ============ -->
  <rect
     x="40"
     y="592.05182"
     width="1050"
     height="82.532494"
     rx="10"
     fill="#f7f7f7"
